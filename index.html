<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>恋爱加减分记录</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --grad-a: #c8607a;
  --grad-b: #9b6fad;
  --bg: #faf8f6;
  --surface: #ffffff;
  --ink: #2c2c2c;
  --ink-2: #666;
  --ink-3: #aaa;
  --line: #ece9e4;
  --green: #4d7c5f;
  --green-bg: #eef4f0;
  --red: #b85450;
  --red-bg: #faf0ef;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100%;
  padding-bottom: calc(72px + var(--safe-bottom));
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ──────────────────────────────────── */
.header {
  background: linear-gradient(140deg, var(--grad-a) 0%, var(--grad-b) 100%);
  border-radius: 0 0 28px 28px;
  padding: 36px 24px 24px;
  text-align: center;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 12px 40px rgba(155, 111, 173, 0.32),
    0 0 0 1px rgba(255,255,255,0.14),
    inset 0 1px 0 rgba(255,255,255,0.50);
}

/* Bokeh orbs — background-image updated each frame by JS */
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
}

/* Frosted glass sheen — bright top reflection + diffuse haze */
.header::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background:
    linear-gradient(180deg,
      rgba(255,255,255,0.28)  0%,
      rgba(255,255,255,0.10) 18%,
      rgba(255,255,255,0.03) 45%,
      rgba(255,255,255,0.00) 68%),
    radial-gradient(ellipse 110% 55% at 50% -8%,
      rgba(255,255,255,0.22) 0%,
      rgba(255,255,255,0.00) 100%);
}



.header-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.5px;
  opacity: 0.92;
  display: inline-block;
  margin-bottom: 20px;
}

.score-block {
  margin-bottom: 6px;
}

.score-number {
  font-size: 68px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -2px;
}

.score-label {
  font-size: 13px;
  opacity: 0.75;
  margin-top: 6px;
  letter-spacing: 0.2px;
}

/* Pills */
.pills {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.pill {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  letter-spacing: 0.1px;
}

/* Progress bar */
.progress-wrap {
  margin-top: 20px;
  position: relative;
}

/* Zone labels above the bar */
.progress-zones {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 5px;
  position: relative;
}

.zone-label {
  font-size: 10px;
  opacity: 0.6;
  letter-spacing: 0.2px;
}

/* Finish-line flag at far right */
@keyframes flagIdle {
  0%   { opacity: 0.52; transform: scale(0.96); }
  9%   { opacity: 0.82; transform: scale(1.07); }
  20%  { opacity: 0.46; transform: scale(0.98); }
  35%  { opacity: 0.78; transform: scale(1.04); }
  48%  { opacity: 0.54; transform: scale(0.97); }
  62%  { opacity: 0.88; transform: scale(1.09); }
  74%  { opacity: 0.44; transform: scale(0.95); }
  88%  { opacity: 0.72; transform: scale(1.03); }
  100% { opacity: 0.52; transform: scale(0.96); }
}
@keyframes flagLit {
  0%   { opacity: 1;    transform: scale(1.26); filter: drop-shadow(0 0 5px rgba(220,170,40,0.80)); }
  10%  { opacity: 0.68; transform: scale(1.13); filter: drop-shadow(0 0 2px rgba(220,170,40,0.25)); }
  24%  { opacity: 1;    transform: scale(1.36); filter: drop-shadow(0 0 9px rgba(220,170,40,1.00)); }
  36%  { opacity: 0.76; transform: scale(1.17); filter: drop-shadow(0 0 3px rgba(220,170,40,0.40)); }
  52%  { opacity: 1;    transform: scale(1.30); filter: drop-shadow(0 0 7px rgba(220,170,40,0.90)); }
  64%  { opacity: 0.64; transform: scale(1.14); filter: drop-shadow(0 0 2px rgba(220,170,40,0.20)); }
  78%  { opacity: 1;    transform: scale(1.40); filter: drop-shadow(0 0 11px rgba(220,170,40,1.00)); }
  90%  { opacity: 0.82; transform: scale(1.22); filter: drop-shadow(0 0 4px rgba(220,170,40,0.55)); }
  100% { opacity: 1;    transform: scale(1.26); filter: drop-shadow(0 0 5px rgba(220,170,40,0.80)); }
}
.finish-flag {
  position: absolute;
  right: 0;
  bottom: 0;
  font-size: 14px;
  line-height: 1;
  transform-origin: bottom right;
  animation: flagIdle 7s ease-in-out infinite;
}
.finish-flag.lit {
  animation: flagLit 5s ease-in-out infinite;
}

.progress-track {
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
  /* Gradient track: danger tint → neutral → gold tint */
  background: linear-gradient(
    to right,
    rgba(220, 120, 100, 0.30) 0%,
    rgba(255, 255, 255, 0.18) 30%,
    rgba(255, 255, 255, 0.18) 70%,
    rgba(220, 180, 60, 0.32)  100%
  );
}

.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              background 0.4s ease;
  min-width: 3px;
}

/* Danger pulse when score <= 60 */
@keyframes dangerPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.55; }
}
.progress-fill.danger { animation: dangerPulse 1.6s ease-in-out infinite; }

/* ─── MAIN ────────────────────────────────────── */
.main {
  padding: 0 18px;
  max-width: 580px;
  margin: 0 auto;
}

/* Status notice */
.notice {
  margin: 14px 0 0;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  display: none;
  border: 1px solid transparent;
}
.notice.show { display: block; }
.notice.warn { background: var(--red-bg); color: var(--red); border-color: #e8c9c8; }
.notice.good { background: var(--green-bg); color: var(--green); border-color: #c8dbd0; }

/* ─── TIMELINE ─────────────────────────────────── */

/* Outer wrapper — holds the vertical axis */
.timeline {
  position: relative;
  padding-left: 24px; /* space for axis */
  padding-top: 6px;
}

/* The axis line: gradient top (visible) → bottom (fades out) */
.timeline::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 0;
  bottom: 0;
  width: 2px;
  border-radius: 1px;
  background: linear-gradient(
    to bottom,
    rgba(200, 96, 122, 0.50) 0%,
    rgba(200, 96, 122, 0.28) 40%,
    rgba(200, 96, 122, 0.10) 75%,
    rgba(200, 96, 122, 0.00) 100%
  );
}

/* Each date group */
.date-group {
  position: relative;
  padding-top: 20px;
}

/* Date node circle on the axis */
.date-label {
  position: relative;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  letter-spacing: 0.3px;
  margin-bottom: 10px;
  padding-left: 4px;
}

/* The dot on the axis for each date */
.date-label::before {
  content: '';
  position: absolute;
  left: -28px;    /* align with axis center (24px padding + 4px = 28px) */
  top: 50%;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  box-shadow: 0 0 0 3px rgba(200, 96, 122, 0.12);
}

/* Today's date group — slightly larger dot */
.date-group.today .date-label::before {
  width: 12px;
  height: 12px;
  left: -29px;
  box-shadow: 0 0 0 4px rgba(200, 96, 122, 0.18);
}

.record-list { /* no border — axis replaces it */ }

.record-row {
  position: relative;
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 0;
  border-bottom: 1px solid var(--line);
  animation: fadeUp 0.28s ease both;
}
/* Last row in a group: no border */
.record-row:last-child { border-bottom: none; }

/* Small connector tick: horizontal dash from axis to row */
.record-row::before {
  content: '';
  position: absolute;
  left: -16px;
  top: 50%;
  width: 10px;
  height: 1px;
  background: rgba(200, 96, 122, 0.22);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Row icon */
.row-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.row-icon.pos { background: var(--green-bg); }
.row-icon.neg { background: var(--red-bg); }

.record-desc {
  flex: 1;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.4;
  min-width: 0;
}

.record-delta {
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.record-delta.pos { color: var(--green); }
.record-delta.neg { color: var(--red); }

.record-running {
  font-size: 11px;
  color: var(--ink-3);
  flex-shrink: 0;
  min-width: 26px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}


/* Timeline end marker */
.timeline-end {
  position: relative;
  padding: 18px 0 6px 4px;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Dashed fade-out below last record */
.timeline-end::before {
  content: '';
  position: absolute;
  left: -24px;
  top: 0;
  width: 2px;
  height: 18px;
  background: linear-gradient(to bottom, rgba(200,96,122,0.08), transparent);
}

/* Little round cap at the very bottom of the axis */
.timeline-end::after {
  content: '';
  position: absolute;
  left: -29px;
  top: 18px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid rgba(200, 96, 122, 0.18);
  background: var(--bg);
}

.timeline-end-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(200,96,122,0.12), transparent);
}

.empty {
  padding: 48px 0;
  text-align: center;
  color: var(--ink-3);
  font-size: 14px;
}

.export-link {
  display: block;
  text-align: center;
  margin: 32px 0 8px;
  font-size: 12px;
  color: var(--ink-3);
  cursor: pointer;
  transition: color 0.2s;
}
.export-link:hover { color: var(--ink-2); }

/* ─── BOTTOM BAR ───────────────────────────────── */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  background: var(--surface);
  border-top: 1px solid var(--line);
  padding: 0 20px calc(10px + var(--safe-bottom));
}

.add-trigger {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 0;
  cursor: pointer;
  color: var(--ink-3);
  font-size: 15px;
  transition: color 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.add-trigger:hover { color: var(--ink-2); }

.trigger-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
  flex-shrink: 0;
}

/* ─── BOTTOM SHEET ─────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  z-index: 30;
  pointer-events: none;
  transition: background 0.25s;
}
.overlay.open {
  background: rgba(44, 20, 30, 0.30);
  pointer-events: auto;
}

.sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 40;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  padding: 0 20px calc(28px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  max-width: 580px;
  margin: 0 auto;
  /* match bottom sheet left/right when max-width kicks in */
}

@media (min-width: 580px) {
  .sheet {
    left: 50%;
    right: auto;
    width: 580px;
    transform: translateX(-50%) translateY(100%);
  }
  .sheet.open { transform: translateX(-50%) translateY(0); }
}

.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--line);
  border-radius: 2px;
  margin: 12px auto 22px;
}

.sheet-head {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 18px;
}

/* Fields */
.field { margin-bottom: 14px; }

.field-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-3);
  letter-spacing: 0.3px;
  margin-bottom: 6px;
}

input[type="date"],
input[type="text"] {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 11px;
  padding: 12px 13px;
  font-size: 15px;
  font-family: inherit;
  color: var(--ink);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
input:focus {
  border-color: var(--grad-b);
  background: var(--surface);
}

/* Score stepper + presets */
.score-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.stepper {
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 11px;
  overflow: hidden;
  background: var(--bg);
  flex-shrink: 0;
}

.step-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  color: var(--ink-2);
  padding: 10px 15px;
  line-height: 1;
  font-family: inherit;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.step-btn:hover { background: var(--line); }
.step-btn:active { background: #ddd; }

.step-val {
  min-width: 46px;
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  pointer-events: none;
}
.step-val.pos { color: var(--green); }
.step-val.neg { color: var(--red); }
.step-val.zero { color: var(--ink-3); }

.presets {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  flex: 1;
}

.preset {
  border: 1px solid var(--line);
  background: var(--bg);
  border-radius: 9px;
  padding: 9px 11px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  color: var(--ink-2);
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
  flex: 1;
  text-align: center;
}
.preset:hover { border-color: var(--grad-b); color: var(--grad-b); }
.preset.active.pos { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.preset.active.neg { background: var(--red-bg);   border-color: var(--red);   color: var(--red);   }

/* Submit */
.submit-btn {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  color: #fff;
  border: none;
  border-radius: 13px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.2px;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 4px 14px rgba(155,111,173,0.25);
}
.submit-btn:hover { opacity: 0.88; }
.submit-btn:active { transform: scale(0.99); }

/* ─── TITLE MODAL ──────────────────────────────── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(44, 20, 30, 0.30);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border-radius: 18px;
  padding: 26px 22px;
  width: 100%;
  max-width: 310px;
  box-shadow: 0 20px 50px rgba(44,20,30,0.18);
  animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }

.btn-ghost {
  flex: 1;
  padding: 11px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 11px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  color: var(--ink-2);
}

.btn-solid {
  flex: 2;
  padding: 11px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  color: #fff;
  border: none;
  border-radius: 11px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

/* ─── WISH CARD ────────────────────────────────── */
.wish-bg {
  position: fixed;
  inset: 0;
  background: rgba(44, 20, 30, 0.40);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}

.wish-card {
  background: var(--surface);
  border-radius: 22px;
  padding: 36px 28px 28px;
  text-align: center;
  max-width: 290px;
  width: 100%;
  box-shadow: 0 24px 60px rgba(44,20,30,0.22);
  animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.wish-glyph {
  font-size: 48px;
  line-height: 1;
  margin-bottom: 16px;
}

.wish-title {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.wish-body {
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.65;
  margin-bottom: 24px;
}

.wish-close {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

/* ─── TOAST ────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 88px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(44, 20, 30, 0.82);
  color: #fff;
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s;
  white-space: nowrap;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── INTRO ANIMATIONS ──────────────────────────── */

/* Keyframes */
@keyframes introFade {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes introScale {
  from { opacity: 0; transform: scale(0.80); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes introSlideUp {
  from { opacity: 0; transform: translateY(100%); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes introAxisGrow {
  from { transform: scaleY(0); opacity: 0; }
  to   { transform: scaleY(1); opacity: 1; }
}
@keyframes introGroupSlide {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Initial hidden state (body.intro applied before render) */
body.intro .header-title    { opacity: 0; }
body.intro .score-block     { opacity: 0; }
body.intro .score-label     { opacity: 0; }
body.intro .pills           { opacity: 0; }
body.intro .progress-wrap   { opacity: 0; }
body.intro .header-ledger   { opacity: 0; }
body.intro .notice          { opacity: 0 !important; }
body.intro .bottom-bar      { opacity: 0; }
body.intro #timelineEl      { opacity: 0; }

/* Staged entrance (body.intro-done applied after render) */
body.intro-done .header-title {
  animation: introFade 0.45s cubic-bezier(0.16,1,0.3,1) 0.05s both;
}
body.intro-done .score-block {
  animation: introFade 0.55s cubic-bezier(0.16,1,0.3,1) 0.22s both;
}
body.intro-done .score-label {
  animation: introFade 0.4s ease 0.40s both;
}
body.intro-done .pills {
  animation: introFade 0.4s ease 0.52s both;
}
body.intro-done .progress-wrap {
  animation: introFade 0.4s ease 0.68s both;
}
body.intro-done .header-ledger {
  animation: introFade 0.4s ease 0.80s both;
}
body.intro-done .notice {
  animation: introFade 0.35s ease 0.80s both;
}
body.intro-done .bottom-bar {
  /* slide up from bottom — override fixed transform carefully */
  opacity: 0;
  animation: introSlideUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.55s both;
}
body.intro-done #timelineEl {
  animation: introFade 0.5s ease 0.92s both;
}

/* Per-group stagger applied inline via style */
.date-group.intro-group {
  opacity: 0;
  animation: introGroupSlide 0.38s cubic-bezier(0.16,1,0.3,1) both;
}

/* Timeline axis grows top→bottom */
.timeline.intro-axis::before {
  transform-origin: top center;
  animation: introAxisGrow 0.5s cubic-bezier(0.16,1,0.3,1) 1.05s both;
}

/* ─── HEADER LEDGER ────────────────────────── */
.header-ledger {
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 10.5px;
  letter-spacing: 0.5px;
  opacity: 0.58;
}
.ledger-item { display: flex; align-items: center; gap: 4px; }
.ledger-divider {
  width: 1px;
  height: 9px;
  background: rgba(255,255,255,0.30);
  border-radius: 1px;
}
.ledger-val {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  transition: color 0.4s;
}
.ledger-val.flagged { color: rgba(255,175,155,1); }
.ledger-val.wished  { color: rgba(255,218,100,1); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title" id="titleEl">恋爱加减分记录</div>

  <div class="score-block">
    <div class="score-number" id="scoreEl">—</div>
    <div class="score-label" id="scoreLabelEl">正在加载…</div>
  </div>

  <div class="pills">
    <div class="pill">60 分以下 = 拉黑</div>
    <div class="pill">140 分 = 许愿 1 次</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-zones">
      <span class="zone-label">危险 60</span>
      <span class="zone-label" style="position:absolute;left:25%;transform:translateX(-50%)">安全 80</span>
      <span class="finish-flag" id="finishFlag">✦</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressEl"></div>
    </div>
  </div>

  <div class="header-ledger">
    <div class="ledger-item">拉黑 <span class="ledger-val" id="dangerCountEl">0</span> 次</div>
    <span class="ledger-divider"></span>
    <div class="ledger-item">许愿 <span class="ledger-val" id="wishCountEl">0</span> 次</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="notice" id="noticeEl"></div>
  <div id="timelineEl"></div>
  <div class="export-link" onclick="exportData()">导出备份数据</div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="add-trigger" onclick="openSheet()">
    <div class="trigger-icon">+</div>
    <span>记录新事件</span>
  </div>
</div>

<!-- SHEET OVERLAY -->
<div class="overlay" id="overlayEl" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET -->
<div class="sheet" id="sheetEl">
  <div class="sheet-handle"></div>
  <div class="sheet-head">新记录</div>

  <div class="field">
    <label class="field-label">日期</label>
    <input type="date" id="inputDate">
  </div>

  <div class="field">
    <label class="field-label">事件描述</label>
    <input type="text" id="inputDesc" placeholder="写下发生了什么…" maxlength="60">
  </div>

  <div class="field">
    <label class="field-label">分值</label>
    <div class="score-row">
      <div class="stepper">
        <button class="step-btn" onclick="stepScore(-1)">−</button>
        <div class="step-val zero" id="stepValEl">0</div>
        <button class="step-btn" onclick="stepScore(1)">+</button>
      </div>
      <div class="presets">
        <button class="preset" data-v="1"  onclick="quickScore(1)">+1</button>
        <button class="preset" data-v="2"  onclick="quickScore(2)">+2</button>
        <button class="preset" data-v="3"  onclick="quickScore(3)">+3</button>
        <button class="preset" data-v="-1" onclick="quickScore(-1)">−1</button>
        <button class="preset" data-v="-2" onclick="quickScore(-2)">−2</button>
        <button class="preset" data-v="-3" onclick="quickScore(-3)">−3</button>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="addRecord()">记录</button>
</div>


<!-- WISH CARD -->
<div id="wishEl" style="display:none" class="wish-bg" onclick="closeWish()">
  <div class="wish-card">
    <div class="wish-glyph">✨</div>
    <div class="wish-title">达成许愿条件</div>
    <div class="wish-body">当前分数已达到 140 分<br>获得 1 次许愿机会<br><small style="color:var(--ink-3)">提醒：许愿不可累积</small></div>
    <button class="wish-close" onclick="closeWish()">知道啦</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toastEl"></div>

<script>
/* ─── Constants ─────────────────────────── */
const BASE   = 100;
const DANGER = 60;
const WISH   = 140;
const API    = './api.php';

let appState = { records: [] };

/* Count how many times running total crossed from <140 to >=140 */
function calcWishCount(records) {
  let running = BASE, count = 0, wasBelow = true;
  for (const r of records) {
    running += r.score;
    const isAbove = running >= WISH;
    if (isAbove && wasBelow) count++;
    wasBelow = !isAbove;
  }
  return count;
}

function calcDangerCount(records) {
  let running = BASE, count = 0, wasSafe = true;
  for (const r of records) {
    running += r.score;
    const isDanger = running <= DANGER;
    if (isDanger && wasSafe) count++;
    wasSafe = !isDanger;
  }
  return count;
}

function calcScore(records) { return BASE + records.reduce((a,r)=>a+r.score,0); }

/* ─── Score stepper ──────────────────────── */
let sel = 0;

function setSel(v) {
  sel = Math.max(-99, Math.min(99, v));
  const el = document.getElementById('stepValEl');
  el.textContent = sel > 0 ? '+'+sel : String(sel);
  el.className = 'step-val ' + (sel>0?'pos':sel<0?'neg':'zero');
  document.querySelectorAll('.preset').forEach(b=>{
    b.classList.remove('active','pos','neg');
    if (+b.dataset.v === sel) b.classList.add('active', sel>0?'pos':'neg');
  });
}

function stepScore(d) { setSel(sel+d); }
function quickScore(v) { setSel(v); }

/* ─── Sheet ──────────────────────────────── */
function openSheet() {
  document.getElementById('overlayEl').classList.add('open');
  document.getElementById('sheetEl').classList.add('open');
  setTimeout(()=>document.getElementById('inputDesc').focus(), 120);
}
function closeSheet() {
  document.getElementById('overlayEl').classList.remove('open');
  document.getElementById('sheetEl').classList.remove('open');
  document.getElementById('inputDesc').blur();
}

/* ─── Add ────────────────────────────────── */
async function addRecord() {
  const date = document.getElementById('inputDate').value;
  const desc = document.getElementById('inputDesc').value.trim();
  if (!date)   { toast('请选择日期');            return; }
  if (!desc)   { toast('请填写事件描述');         return; }
  if (sel===0) { toast('请选择分值（不能为 0）'); return; }

  const record = { id: Date.now().toString(), date, desc, score: sel };

  document.getElementById('inputDesc').value = '';
  const earned = sel;
  setSel(0);
  closeSheet();
  toast('提交中…');

  try {
    const res  = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(record),
    });
    const data = await res.json();
    appState = data;
    render(true);
    toast(earned > 0 ? `+${earned} 分，已记录` : `${earned} 分，已记录`);
    const newScore = calcScore(appState.records);
    if (newScore >= WISH) {
      setTimeout(()=>{ document.getElementById('wishEl').style.display='flex'; }, 450);
    }
  } catch(e) {
    toast('提交失败，请检查网络');
  }
}

/* ─── Render ─────────────────────────────── */
function render(newEntry=false, isIntro=false) {
  const state = appState;
  const score = calcScore(state.records);

  document.title = '邱老师加减分记录';

  // Score number
  document.getElementById('scoreEl').textContent = score;

  // Score label
  const lbl = document.getElementById('scoreLabelEl');
  if      (score <= DANGER) lbl.textContent = '已进入拉黑状态';
  else if (score >= WISH)   lbl.textContent = '达成许愿条件 ✦';
  else if (score < 75)      lbl.textContent = `距拉黑还有 ${score-DANGER} 分`;
  else if (score >= 120)    lbl.textContent = '表现优秀，继续保持';
  else                      lbl.textContent = `初始 ${BASE} 分 · 当前 ${score} 分`;

  // Progress [DANGER,WISH]→[0%,100%]
  const pct = Math.min(100, Math.max(0, (score-DANGER)/(WISH-DANGER)*100));
  const prog = document.getElementById('progressEl');
  prog.style.width = pct+'%';
  // Fill color by zone
  let fillColor;
  if      (score <= DANGER) fillColor = '#d45d5d';
  else if (score <  80)     fillColor = '#d4856b';
  else if (score <  120)    fillColor = 'rgba(255,255,255,0.82)';
  else if (score <  WISH)   fillColor = '#d4b86b';
  else                      fillColor = '#d4a843';
  prog.style.background = fillColor;
  prog.classList.toggle('danger', score <= DANGER);

  // Finish flag
  document.getElementById('finishFlag').classList.toggle('lit', score >= WISH);

  // Ledger counts
  const wishCount   = calcWishCount(state.records);
  const dangerCount = calcDangerCount(state.records);
  const dcEl = document.getElementById('dangerCountEl');
  const wcEl = document.getElementById('wishCountEl');
  dcEl.textContent = dangerCount;
  dcEl.className = 'ledger-val' + (dangerCount > 0 ? ' flagged' : '');
  wcEl.textContent = wishCount;
  wcEl.className = 'ledger-val' + (wishCount > 0 ? ' wished' : '');

  // Notice
  const n = document.getElementById('noticeEl');
  if (score <= DANGER) {
    n.textContent = `当前 ${score} 分，已进入拉黑状态。`;
    n.className = 'notice show warn';
  } else if (score >= WISH) {
    n.textContent = `当前 ${score} 分，许愿机会已达成（不可累积）。`;
    n.className = 'notice show good';
  } else if (score < 75) {
    n.textContent = `当前 ${score} 分，距拉黑线仅剩 ${score-DANGER} 分。`;
    n.className = 'notice show warn';
  } else {
    n.className = 'notice';
  }

  renderTimeline(state.records, newEntry, isIntro);
}

function renderTimeline(records, animateFirst, isIntro) {
  const el = document.getElementById('timelineEl');
  if (!records.length) {
    el.innerHTML = '<div class="empty">还没有任何记录</div>';
    return;
  }

  // build running totals
  let running = BASE;
  const withTotals = records.map(r=>{ running+=r.score; return {...r,running}; });

  // group by date newest-first
  const groups = {};
  [...withTotals].reverse().forEach(r=>{
    (groups[r.date] = groups[r.date]||[]).push(r);
  });
  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  const groupsHtml = dates.map((date,gi)=>{
    const label = fmtDate(date);
    const isToday = gi===0 && label.startsWith('今天');
    const rows = groups[date].map((r,ri)=>{
      const pos = r.score>0;
      const delay = (gi===0 && ri===0 && animateFirst) ? 'animation-delay:.05s' : 'animation:none';
      const icon = pos ? '❤️' : '💔';
      const sign = pos ? '+' : '';
      return `<div class="record-row" style="${delay}">
        <div class="row-icon ${pos?'pos':'neg'}">${icon}</div>
        <div class="record-desc">${esc(r.desc)}</div>
        <div class="record-delta ${pos?'pos':'neg'}">${sign}${r.score}</div>
        <div class="record-running">${r.running}</div>
      </div>`;
    }).join('');
    // Intro stagger: groups appear one by one after timeline container fades in
    const groupStyle = isIntro
      ? `class="date-group${isToday?' today':''} intro-group" style="animation-delay:${1.05 + gi*0.11}s"`
      : `class="date-group${isToday?' today':''}"`;
    return `<div ${groupStyle}>
      <div class="date-label">${label}</div>
      <div class="record-list">${rows}</div>
    </div>`;
  }).join('');

  const axisClass = isIntro ? 'timeline intro-axis' : 'timeline';
  el.innerHTML = `<div class="${axisClass}">${groupsHtml}<div class="timeline-end"><span class="timeline-end-line"></span><span>过去</span><span class="timeline-end-line"></span></div></div>`;
}

/* ─── Helpers ────────────────────────────── */
function fmtDate(s) {
  const d = new Date(s+'T00:00:00');
  const now = new Date();
  const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const diff = (today - new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000;
  const base = `${d.getMonth()+1} 月 ${d.getDate()} 日`;
  if (diff===0) return `今天 · ${base}`;
  if (diff===1) return `昨天 · ${base}`;
  return base;
}

function esc(s) {
  const d=document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function toast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2100);
}



/* ─── Wish ───────────────────────────────── */
function closeWish() { document.getElementById('wishEl').style.display='none'; }

/* ─── Export ─────────────────────────────── */
function exportData() {
  const s = appState;
  const data = {...s, currentScore:calcScore(s.records), exportedAt:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url;
  a.download=`加减分记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('已导出');
}

/* ─── Score counter animation ───────────── */
function animateScore(target, duration) {
  const el = document.getElementById('scoreEl');
  const start = performance.now();
  const easeOut = t => 1 - Math.pow(1 - t, 3);
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    el.textContent = Math.round(easeOut(t) * target);
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = target; // ensure exact final value
  }
  el.textContent = '0';
  requestAnimationFrame(step);
}

/* ─── Init ───────────────────────────────── */
document.addEventListener('DOMContentLoaded', async ()=>{
  // default date = today
  const n=new Date();
  document.getElementById('inputDate').value =
    `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;

  setSel(0);
  document.body.classList.add('intro');

  // 从服务器加载数据，再触发入场动画
  const SAMPLE_DATA = { records: [
    { id: '1745000000001', date: '2026-04-01', desc: '主动帮忙做了家务',         score:  3 },
    { id: '1745000000002', date: '2026-04-03', desc: '约好了时间却临时放鸽子',   score: -2 },
    { id: '1745000000003', date: '2026-04-05', desc: '送了一束花，超级浪漫',     score:  3 },
    { id: '1745000000004', date: '2026-04-10', desc: '吵架了，说了不好听的话',   score: -3 },
    { id: '1745000000005', date: '2026-04-10', desc: '主动道歉并认真反思',       score:  2 },
    { id: '1745000000006', date: '2026-04-15', desc: '记住了纪念日并提前准备',   score:  3 },
    { id: '1745000000007', date: '2026-04-20', desc: '玩游戏忘记回消息',         score: -1 },
    { id: '1745000000008', date: '2026-04-28', desc: '一起做了顿好吃的晚餐',     score:  2 },
  ]};
  try {
    const res  = await fetch(API);
    const data = await res.json();
    appState   = (data.records && data.records.length) ? data : SAMPLE_DATA;
  } catch(e) {
    appState = SAMPLE_DATA;
  }

  render(false, true);

  const finalScore = calcScore(appState.records);
  const prog = document.getElementById('progressEl');
  const targetWidth = prog.style.width;
  prog.style.transition = 'none';
  prog.style.width = '0%';

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      document.body.classList.remove('intro');
      document.body.classList.add('intro-done');
      setTimeout(()=> animateScore(finalScore, 520), 220);
      setTimeout(()=>{
        prog.style.transition = 'width 0.65s cubic-bezier(0.16,1,0.3,1), background 0.4s ease';
        prog.style.width = targetWidth;
      }, 680);
    });
  });

  // Bokeh float — each orb computed as a full-element radial-gradient with `at X% Y%`
  // This means the gradient fills the whole header; no background-size boxes, no hard edges.
  (() => {
    // cx/cy = center % starting position; rx/ry = amplitude of sine wander in %
    // fx/fy = frequency (rad/s); px/py = phase offset
    // color = [r,g,b]; a = peak opacity; ew/eh = ellipse width/height % of element
    const orbs = [
      { cx:18, cy:28, rx:26, ry:22, fx:0.31, fy:0.47, px:0.00, py:1.20, color:[255,255,255], a:0.42, ew:68, eh:78 },
      { cx:80, cy:18, rx:22, ry:18, fx:0.53, fy:0.29, px:2.10, py:0.70, color:[255,210,232], a:0.34, ew:60, eh:70 },
      { cx:52, cy:75, rx:30, ry:18, fx:0.19, fy:0.61, px:1.40, py:0.30, color:[255,255,255], a:0.36, ew:72, eh:64 },
      { cx:42, cy:15, rx:24, ry:22, fx:0.67, fy:0.37, px:0.80, py:1.90, color:[224,188,255], a:0.30, ew:62, eh:72 },
      { cx:82, cy:60, rx:18, ry:24, fx:0.43, fy:0.23, px:1.60, py:0.50, color:[255,200,222], a:0.32, ew:56, eh:68 },
    ];
    const styleTag = document.createElement('style');
    document.head.appendChild(styleTag);
    function tick() {
      const t = performance.now() / 1000;
      const gradients = orbs.map(o => {
        const x = Math.max(3, Math.min(97, o.cx + Math.sin(t * o.fx + o.px) * o.rx)).toFixed(1);
        const y = Math.max(3, Math.min(97, o.cy + Math.cos(t * o.fy + o.py) * o.ry)).toFixed(1);
        const [r,g,b] = o.color;
        const a0 = o.a, a1 = +(o.a * 0.40).toFixed(2);
        // Three-stop falloff: peak → mid → fully transparent — no hard edge
        return `radial-gradient(ellipse ${o.ew}% ${o.eh}% at ${x}% ${y}%, rgba(${r},${g},${b},${a0}) 0%, rgba(${r},${g},${b},${a1}) 45%, rgba(${r},${g},${b},0.0) 100%)`;
      }).join(', ');
      styleTag.textContent = `.header::before { background-image: ${gradients} !important; }`;
      requestAnimationFrame(tick);
    }
    tick();
  })();

  document.getElementById('inputDesc').addEventListener('keydown', e=>{
    if(e.key==='Enter')  addRecord();
    if(e.key==='Escape') closeSheet();
  });
});
</script>
</body>
</html>
